  <rect x="70" y="82" width="240" height="58" rx="29" fill="#ffd43b"/>
  <text x="190" y="121" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="#101820">건설현장 구인</text>
  <text x="70" y="250" font-family="sans-serif" font-size="74" font-weight="800" fill="#ffffff">함께 일할 분을</text>
