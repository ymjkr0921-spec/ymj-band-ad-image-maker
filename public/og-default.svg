<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#07192e"/>
      <stop offset="1" stop-color="#102f50"/>
    </linearGradient>
    <pattern id="stripe" width="56" height="56" patternUnits="userSpaceOnUse" patternTransform="rotate(135)">
      <rect width="28" height="56" fill="#ffd43b"/>
      <rect x="28" width="28" height="56" fill="#101820"/>
